<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>新人留名系統｜新人留名</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<header>
  <h1>新人留名系統</h1>
  <nav>
    <a class="active" href="index.html">新人留名</a>
    <a href="data.html">資料中心</a>
  </nav>
</header>

<main class="container">
  <section class="card">
    <h2>新人留名</h2>

    <form id="newcomerForm">
      <label>日期 *
        <input type="date" id="visitDate" required>
      </label>

      <label>姓名 *
        <input type="text" id="name" placeholder="請輸入新人姓名" required>
      </label>

      <label>性別 *
        <div class="option-grid two">
          <label><input type="radio" name="gender" value="男" required> 男</label>
          <label><input type="radio" name="gender" value="女" required> 女</label>
        </div>
      </label>

      <label>年齡區間 *
        <select id="ageGroup" required>
          <option value="">請選擇</option>
          <option>18歲以下</option>
          <option>18~25歲</option>
          <option>26~35歲</option>
          <option>36~45歲</option>
          <option>46~55歲</option>
          <option>56~65歲</option>
          <option>66~75歲</option>
          <option>76~85歲</option>
          <option>86歲以上</option>
        </select>
      </label>

      <label>縣市 *
        <select id="city" required>
          <option value="">請選擇縣市</option>
        </select>
      </label>

      <label>行政區 *
        <select id="district" required>
          <option value="">請先選擇縣市</option>
        </select>
      </label>

      <label>所屬區域 *
        <select id="churchArea" required>
          <option value="">請選擇</option>
          <option>北部1區</option>
          <option>北部2區</option>
          <option>北部3區</option>
          <option>北部4區</option>
          <option>管制區</option>
          <option>其他</option>
        </select>
      </label>

      <label>來教會原因
        <select id="reason">
          <option value="">請選擇</option>
          <option>親友邀請</option>
          <option>網路資訊</option>
          <option>社區活動</option>
          <option>路過</option>
          <option>尋求信仰</option>
          <option>需要禱告</option>
          <option>其他</option>
        </select>
      </label>

      <label>新人需求
        <select id="need">
          <option value="">請選擇</option>
          <option>認識信仰</option>
          <option>需要禱告</option>
          <option>家庭關係</option>
          <option>工作職場</option>
          <option>課業問題</option>
          <option>身心壓力</option>
          <option>陪讀聖經</option>
          <option>其他</option>
        </select>
      </label>

      <label>來過次數
        <select id="visitTimes">
          <option value="">請選擇</option>
          <option>第1次</option>
          <option>第2次</option>
          <option>第3次</option>
          <option>第4次以上</option>
        </select>
      </label>

      <div class="checks">
        <label><input type="checkbox" id="willingReturn"> 願意再來</label>
        <label><input type="checkbox" id="willingBibleStudy"> 願意接受陪讀</label>
      </div>

      <label>邀約人
        <input type="text" id="inviter" placeholder="例：王弟兄、李姊妹">
      </label>

      <label>接待人
        <input type="text" id="receptionist" placeholder="例：陳弟兄、林姊妹">
      </label>

      <label>備註
        <textarea id="note" rows="3" placeholder="代禱事項、特殊需求、關懷紀錄"></textarea>
      </label>

      <button type="submit" class="primary">送出留名</button>
    </form>
  </section>
</main>

<script src="app.js"></script>
</body>
</html>
