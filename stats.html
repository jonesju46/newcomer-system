<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>新人留名｜統計</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<header>
  <h1>新人留名系統</h1>
  <nav>
    <a href="index.html">留名紀錄</a>
    <a class="active" href="stats.html">統計</a>
  </nav>
</header>

<main class="container">
  <section class="card">
    <h2>新人統計</h2>
    <div class="summary-grid">
      <div class="summary"><span id="totalCount">0</span><small>總留名人數</small></div>
      <div class="summary"><span id="returnCount">0</span><small>願意再來</small></div>
      <div class="summary"><span id="actualReturnCount">0</span><small>實際有再來</small></div>
      <div class="summary"><span id="bibleStudyCount">0</span><small>願意陪讀</small></div>
    </div>
  </section>

  <section class="card">
    <h2>依所屬區域統計</h2>
    <div id="areaStats"></div>
  </section>

  <section class="card">
    <h2>依年齡層統計</h2>
    <div id="ageStats"></div>
  </section>

  <section class="card">
    <h2>依來教會原因統計</h2>
    <div id="reasonStats"></div>
  </section>

  <section class="card">
    <h2>依新人需求統計</h2>
    <div id="needStats"></div>
  </section>
</main>

<script src="stats.js"></script>
</body>
</html>
